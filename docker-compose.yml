services:
  db:
    image: postgres:16-alpine
    container_name: projeto_gm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: projeto_gm
      POSTGRES_USER: projeto_gm
      POSTGRES_PASSWORD: projeto_gm
    ports:
      - "8002:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projeto_gm -d projeto_gm"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: projeto_gm_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  adminer:
    image: adminer:4.8.1
    container_name: projeto_gm_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
